# KataGo analysis config for GoSensei teaching mode
# Tuned for reasonable response times on consumer hardware

# Search limits
maxVisits = 200
numSearchThreads = 2

# Report top 5 moves for coaching analysis
reportAnalysisWinratesAs = BLACK

# Neural network settings
nnMaxBatchSize = 8
nnCacheSizePowerOfTwo = 20

# Search tuning for teaching
# Wider search to explore more candidate moves
wideRootNoise = 0.04

# Enable ownership for territory visualization
allowAnalysisOverrideForExplorationSettings = true
