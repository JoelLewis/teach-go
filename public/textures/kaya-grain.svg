<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512">
  <defs>
    <filter id="wood" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.15" numOctaves="5" seed="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="matrix" in="noise"
        values="0 0 0 0 0.83
                0 0 0 0 0.77
                0 0 0 0 0.66
                0 0 0 0.12 0" result="grain"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#d4c5a9"/>
  <rect width="100%" height="100%" filter="url(#wood)"/>
</svg>
